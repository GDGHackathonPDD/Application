<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 80 80"
  width="80"
  height="80"
  role="img"
  aria-labelledby="logo-title"
>
  <title id="logo-title">AiGenda</title>
  <!-- Fill #3d7a9e matches light theme primary in globals.css -->
  <g id="grid">
    <rect x="2" y="2" width="22" height="22" rx="2" fill="#3d7a9e" fill-opacity="0.15" />
    <rect x="29" y="2" width="22" height="22" rx="2" fill="#3d7a9e" fill-opacity="0.15" />
    <rect x="56" y="2" width="22" height="22" rx="2" fill="#3d7a9e" fill-opacity="0.15" />
    <rect x="2" y="29" width="22" height="22" rx="2" fill="#3d7a9e" fill-opacity="0.15" />
    <rect x="29" y="29" width="22" height="22" rx="2" fill="#3d7a9e" fill-opacity="0.15" />
    <rect x="56" y="29" width="22" height="22" rx="2" fill="#3d7a9e" fill-opacity="0.15" />
    <rect x="2" y="56" width="22" height="22" rx="2" fill="#3d7a9e" fill-opacity="0.15" />
    <rect x="29" y="56" width="22" height="22" rx="2" fill="#3d7a9e" fill-opacity="0.15" />
    <rect x="56" y="56" width="22" height="22" rx="2" fill="#3d7a9e" fill-opacity="0.15" />
  </g>
  <g id="connectors" opacity="0.4">
    <line x1="20" y1="20" x2="40" y2="40" stroke="#3d7a9e" stroke-width="1.5" />
    <line x1="60" y1="20" x2="40" y2="40" stroke="#3d7a9e" stroke-width="1.5" />
    <line x1="20" y1="60" x2="40" y2="40" stroke="#3d7a9e" stroke-width="1.5" />
    <line x1="60" y1="60" x2="40" y2="40" stroke="#3d7a9e" stroke-width="1.5" />
  </g>
  <g id="nodes">
    <circle cx="20" cy="20" r="4" fill="#3d7a9e" />
    <circle cx="60" cy="20" r="4" fill="#3d7a9e" />
    <circle cx="40" cy="40" r="5" fill="#3d7a9e" />
    <circle cx="20" cy="60" r="4" fill="#3d7a9e" />
    <circle cx="60" cy="60" r="4" fill="#3d7a9e" />
  </g>
  <g id="arrow">
    <path
      d="M 20 65 Q 30 20 40 10"
      stroke="#3d7a9e"
      stroke-width="3"
      stroke-linecap="round"
      fill="none"
    />
    <polygon points="40,10 36,17 43,15" fill="#3d7a9e" />
    <path
      d="M 40 10 Q 50 20 60 65"
      stroke="#3d7a9e"
      stroke-width="3"
      stroke-linecap="round"
      fill="none"
    />
    <polygon points="60,65 56,58 63,60" fill="#3d7a9e" />
    <path
      d="M 26 48 Q 40 45 54 48"
      stroke="#3d7a9e"
      stroke-width="3"
      stroke-linecap="round"
      fill="none"
    />
  </g>
</svg>
